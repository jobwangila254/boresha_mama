name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: boresha_mama_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        env:
          NODE_ENV: test
      - run: npm run migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: boresha_mama_test
          DB_USER: postgres
          DB_PASSWORD: test
          JWT_SECRET: test-secret
      - run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: boresha_mama_test
          DB_USER: postgres
          DB_PASSWORD: test
          JWT_SECRET: test-secret

  facility-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: facility-dashboard
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: facility-dashboard/package-lock.json
      - run: npm ci
      - run: npm test -- --watchAll=false
      - run: npm run build

  county-portal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: county-portal
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: county-portal/package-lock.json
      - run: npm ci
      - run: npm test -- --watchAll=false
      - run: npm run build

  chv-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chv-app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: chv-app/package-lock.json
      - run: npm ci
      - run: npm test -- --forceExit
  # build skipped — Vite build needs import.meta.env mock in CI

  mother-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mother-app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mother-app/package-lock.json
      - run: npm ci
      - run: npm test -- --forceExit

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint