services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boresha_mama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Qwerty123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: boresha_mama
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-Qwerty123}
      JWT_SECRET: ${JWT_SECRET:-demo-jwt-secret-change-in-production}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
      - ./backend/src:/app/src
    command: sh -c "node src/migrations/run.js && node src/migrations/seed-admin.js && node src/index.js"

  facility-dashboard:
    build: ./facility-dashboard
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./facility-dashboard/src:/app/src

  county-portal:
    build: ./county-portal
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3001:3001"
    volumes:
      - ./county-portal/src:/app/src

  mother-app:
    build: ./mother-app
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_PORT: 3002
    ports:
      - "3002:3002"
    volumes:
      - ./mother-app/src:/app/src

  chv-app:
    build: ./chv-app
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_PORT: 3003
    ports:
      - "3003:3003"
    volumes:
      - ./chv-app/src:/app/src

volumes:
  pgdata:
  uploads:
  logs:
