<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#004d26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006633;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer shield -->
  <path d="M200 20 L360 100 L360 220 Q360 320 200 380 Q40 320 40 220 L40 100 Z"
        fill="url(#shieldGrad)" stroke="#DAA520" stroke-width="4"/>

  <!-- Inner shield -->
  <path d="M200 45 L335 115 L335 215 Q335 305 200 355 Q65 305 65 215 L65 115 Z"
        fill="#008040" stroke="#FFD700" stroke-width="2"/>

  <!-- Gold diagonal band (from flag) -->
  <path d="M65 200 L200 45 L200 355 L65 290 Z"
        fill="url(#goldGrad)" opacity="0.15"/>

  <!-- Cogwheel -->
  <circle cx="200" cy="200" r="70" fill="none" stroke="#DAA520" stroke-width="3"/>
  <circle cx="200" cy="200" r="55" fill="#004d26" stroke="#FFD700" stroke-width="2"/>

  <!-- Maize/crop motif - left stalk -->
  <path d="M160 200 Q155 170 165 145 Q170 135 175 145 Q180 170 175 200Z"
        fill="#7CFC00" opacity="0.8"/>
  <path d="M160 200 Q155 170 165 145 Q170 135 175 145 Q180 170 175 200Z"
        fill="#6BBF00" opacity="0.4"/>
  <!-- Right stalk -->
  <path d="M240 200 Q235 170 245 145 Q250 135 255 145 Q260 170 255 200Z"
        fill="#7CFC00" opacity="0.8"/>
  <path d="M240 200 Q235 170 245 145 Q250 135 255 145 Q260 170 255 200Z"
        fill="#6BBF00" opacity="0.4"/>

  <!-- Maize cob left -->
  <ellipse cx="158" cy="148" rx="6" ry="15" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <ellipse cx="255" cy="148" rx="6" ry="15" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>

  <!-- Leaves -->
  <path d="M160 180 Q140 175 130 195 Q140 195 160 195Z" fill="#228B22" opacity="0.6"/>
  <path d="M255 180 Q275 175 285 195 Q275 195 255 195Z" fill="#228B22" opacity="0.6"/>

  <!-- Sun at top -->
  <circle cx="200" cy="105" r="12" fill="#FFD700"/>
  <g stroke="#FFD700" stroke-width="1.5" opacity="0.7">
    <line x1="200" y1="88" x2="200" y2="82"/>
    <line x1="200" y1="122" x2="200" y2="128"/>
    <line x1="183" y1="105" x2="177" y2="105"/>
    <line x1="217" y1="105" x2="223" y2="105"/>
    <line x1="188" y1="93" x2="184" y2="89"/>
    <line x1="212" y1="117" x2="216" y2="121"/>
    <line x1="188" y1="117" x2="184" y2="121"/>
    <line x1="212" y1="93" x2="216" y2="89"/>
  </g>

  <!-- Inner circle symbol - mother and child -->
  <circle cx="200" cy="200" r="35" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <path d="M185 200 Q185 185 200 185 Q215 185 215 200 L215 215"
        fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="200" cy="178" r="6" fill="#FFD700"/>
  <!-- Arms -->
  <path d="M188 190 Q180 195 178 205" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <path d="M212 190 Q220 195 222 205" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>

  <!-- Text: Trans-Nzoia County -->
  <text x="200" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="16" font-weight="bold" fill="#FFD700" letter-spacing="2">
    TRANS-NZOIA
  </text>
  <text x="200" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="12" font-weight="bold" fill="#FFD700" letter-spacing="3">
    COUNTY
  </text>

  <!-- Tagline at bottom -->
  <text x="200" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="11" fill="#DAA520" letter-spacing="1" font-style="italic">
    Unity in Diversity
  </text>
</svg>
